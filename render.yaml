services:
  - type: web
    name: drone-server
    runtime: python
    repo: https://github.com/Shreyasnu7/Drone_Server
    plan: free
    region: oregon 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
    rootDir: server
    autoDeploy: true
