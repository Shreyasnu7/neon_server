services:
  - type: web
    name: drone-server
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME # You will connect this via UI
    plan: free
    region: oregon 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
    rootDirectory: server
    autoDeploy: true
